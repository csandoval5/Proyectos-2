<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller de Motos Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
    <!-- SIDEBAR -->
    <aside class="sidebar-profile">
        <div class="profile-card">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <div>
                <h3 id="userName">Usuario</h3>
                <span id="userRole" class="role-badge">Admin</span>
            </div>
            <button id="btnLogout" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <nav class="quick-actions">
            <button id="btnExportExcel" class="quick-btn admin-only"><i class="fas fa-file-excel"></i></button>
        </nav>
    </aside>

    <main class="main-container">
        <!-- LOGIN OVERLAY -->
        <div class="login-overlay" id="loginScreen">
            <div class="login-card">
                <div class="login-header">
                    <i class="fas fa-motorcycle login-icon"></i>
                    <h1>Ingreso Taller de Motos</h1>
                    <p>Sistema de Inventario Appwrite</p>
                </div>
                <form id="loginForm">
                    <div class="input-group">
                        <label for="loginEmail">Correo</label>
                        <input type="email" id="loginEmail" placeholder="admin@taller.com" required>
                    </div>
                    <div class="input-group">
                        <label for="loginPassword">Contraseña</label>
                        <input type="password" id="loginPassword" placeholder="••••••" required>
                    </div>
                    <button type="submit" class="btn btn-indigo w-full">
                        <i class="fas fa-sign-in-alt"></i> Ingresar
                    </button>
                </form>
            </div>
        </div>

        <!-- APP CONTENT -->
        <div id="appWrapper" class="hidden">
            <header class="app-header">
                <div class="brand">
                    <i class="fas fa-motorcycle"></i>
                    <h1>Taller de Motos Pro</h1>
                </div>
                <div class="search-global">
                    <i class="fas fa-search"></i>
                    <input id="globalSearch" placeholder="Buscar...">
                </div>
            </header>

            <section class="dashboard-stats">
                <div class="stat-card emerald">
                    <i class="fas fa-boxes-stacked"></i>
                    <div>Productos <span id="totalProducts">0</span></div>
                </div>
                <!-- Stats... -->
            </section>

            <!-- TABS + FORMS + TABLES -->
            <nav class="tabs-nav">
                <button onclick="showTab('productos')">Productos</button>
                <button onclick="showTab('clientes')">Clientes</button>
                <button onclick="showTab('ventas')">Ventas</button>
            </nav>

            <div id="productos" class="tab-panel active">
                <form id="productForm">
                    <input id="productNombre" required>
                    <input id="productPrecio" type="number">
                    <input id="productCantidad" type="number">
                    <button>Guardar</button>
                </form>
                <table id="productosBody"></table>
            </div>
            <!-- Other tabs... -->
        </div>
    </main>

    <!-- SDK CRÍTICO PRIMERO -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1/dist/iife/sdk.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
