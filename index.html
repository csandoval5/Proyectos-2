<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller de Motos Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
    <!-- SIDEBAR -->
    <aside class="sidebar-profile">
        <div class="profile-card">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <div>
                <h3 id="userName">Usuario</h3>
                <span id="userRole" class="role-badge">Admin</span>
            </div>
            <button id="btnLogout" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <nav class="quick-actions">
            <button id="btnExportExcel" class="quick-btn admin-only"><i class="fas fa-file-excel"></i></button>
        </nav>
    </aside>

    <main class="main-container">
        <!-- LOGIN OVERLAY - SOLID -->
        <div class="login-overlay" id="loginScreen">
            <div class="login-card">
                <div class="login-header">
                    <i class="fas fa-motorcycle login-icon"></i>
                    <h1>Ingreso Taller de Motos</h1>
                    <p>Sistema de Inventario Appwrite</p>
                </div>
                <form id="loginForm">
                    <div class="input-group">
                        <label for="loginEmail">Correo</label>
                        <input type="email" id="loginEmail" placeholder="admin@taller.com" required>
                    </div>
                    <div class="input-group">
                        <label for="loginPassword">Contraseña</label>
                        <input type="password" id="loginPassword" placeholder="••••••" required>
                    </div>
                    <button type="submit" class="btn btn-indigo w-full">
                        <i class="fas fa-sign-in-alt"></i> Ingresar
                    </button>
                </form>
            </div>
        </div>

        <!-- APP CONTENT -->
        <div id="appWrapper" class="hidden">
            <header class="app-header">
                <div class="brand">
                    <i class="fas fa-motorcycle"></i>
                    <h1>Taller de Motos Pro</h1>
                </div>
                <div class="search-global">
                    <i class="fas fa-search"></i>
                    <input id="globalSearch" placeholder="Buscar...">
                </div>
            </header>

            <!-- DASHBOARD -->
            <section class="dashboard-stats">
                <div class="stat-card emerald">
                    <i class="fas fa-boxes-stacked"></i>
                    <div>
                        <div>Productos</div>
                        <div id="totalProducts">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-warehouse"></i>
                    <div>
                        <div>Stock Total</div>
                        <div id="totalStock">0</div>
                    </div>
                </div>
                <!-- More stats... -->
            </section>

            <!-- TABS -->
            <nav class="tabs-nav">
                <button class="tab-btn active" onclick="showTab('productos')">
                    <i class="fas fa-box"></i> Productos <span id="badgeProductos">0</span>
                </button>
                <button class="tab-btn" onclick="showTab('clientes')">
                    <i class="fas fa-users"></i> Clientes <span id="badgeClientes">0</span>
                </button>
                <button class="tab-btn" onclick="showTab('ventas')">
                    <i class="fas fa-receipt"></i> Ventas <span id="badgeVentas">0</span>
                </button>
            </nav>

            <!-- PRODUCTOS TAB (form + table) -->
            <div id="productos" class="tab-panel active">
                <div class="content-grid">
                    <div class="panel-card">
                        <form id="productForm">
                            <input id="productNombre" placeholder="Nombre" required>
                            <input id="productPrecio" type="number" placeholder="Precio" required>
                            <input id="productCantidad" type="number" placeholder="Cantidad" required>
                            <button type="submit">Guardar</button>
                        </form>
                    </div>
                    <table class="glass-table">
                        <tbody id="productosBody"></tbody>
                    </table>
                </div>
            </div>
            <!-- Other tabs similar... -->
        </div>
    </main>

    <!-- FIXED CDN ORDER -->
https://cdn.jsdelivr.net/npm/appwrite@14.0.1/dist/iife/sdk.bundle.js
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
